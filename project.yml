# XcodeGen spec — generate the Xcode project with:  xcodegen generate
# We keep this declarative spec under version control instead of a .xcodeproj.
name: Tameo

options:
  bundleIdPrefix: jp.co.ati-mirai  # ati-mirai.co.jp の逆ドメイン（配布ドメイン tameo.ati-mirai.co.jp に整合）
  deploymentTarget:
    macOS: "14.0"                   # SwiftData の下限。13へ下げる場合は SwiftData 非依存化が必要
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.1"          # 人が読む版。意味のある変更で手動更新（セマンティック）
    CURRENT_PROJECT_VERSION: "1"        # ビルド番号の既定。日常ビルドは scripts/build-app.sh が git コミット数で上書き
    SWIFT_VERSION: "5.0"            # TODO: 実装が安定したら Swift 6 言語モードへ
    DEVELOPMENT_TEAM: "8NY87P5TYV"  # ATI K.K. (Apple Developer Program / org)。署名身元の安定 = 権限保持に必須
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES   # notarize 前提

targets:
  Tameo:
    type: application
    platform: macOS
    sources:
      - Tameo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.co.ati-mirai.tameo   # 確定（ati-mirai.co.jp の逆ドメイン）
        PRODUCT_NAME: Tameo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES               # メニューバー常駐・Dockアイコン非表示
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 ATI Inc."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon  # Tameo/Assets.xcassets の AppIcon を使う
    dependencies:
      - package: Sauce             # キーレイアウト補正キーコード（CGEvent Cmd+V 合成用, M2）
      - package: KeyboardShortcuts # グローバルホットキー（M2）

packages:
  Sauce:
    url: https://github.com/Clipy/Sauce
    from: "2.4.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: "3.0.1"          # 3.0.0 はリリースビルドでクラッシュするため厳密固定
