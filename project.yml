# XcodeGen spec — generate the Xcode project with:  xcodegen generate
# We keep this declarative spec under version control instead of a .xcodeproj.
name: Tameo

options:
  bundleIdPrefix: jp.co.ati-mirai  # ati-mirai.co.jp の逆ドメイン（配布ドメイン tameo.ati-mirai.co.jp に整合）
  deploymentTarget:
    macOS: "14.0"                   # SwiftData の下限。13へ下げる場合は SwiftData 非依存化が必要
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.9"          # 人が読む版。意味のある変更で手動更新（セマンティック）
    CURRENT_PROJECT_VERSION: "1"        # ビルド番号の既定。日常ビルドは scripts/build-app.sh が git コミット数で上書き
    SWIFT_VERSION: "5.0"            # TODO: 実装が安定したら Swift 6 言語モードへ
    DEVELOPMENT_TEAM: "8NY87P5TYV"  # ATI K.K. (Apple Developer Program / org)。署名身元の安定 = 権限保持に必須
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES   # notarize 前提

targets:
  Tameo:
    type: application
    platform: macOS
    sources:
      - path: Tameo
        excludes:
          - Info.plist                            # INFOPLIST_FILE として使うのでソース/リソースには含めない
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.co.ati-mirai.tameo   # 確定（ati-mirai.co.jp の逆ドメイン）
        PRODUCT_NAME: Tameo
        # Sparkle の SUFeedURL/SUPublicEDKey は INFOPLIST_KEY_ で載らない（Apple既定キーのみ対応）ため、
        # 明示 Info.plist を使う。バージョン等は $(VAR) で従来どおりビルド設定から展開される。
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Tameo/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon  # Tameo/Assets.xcassets の AppIcon を使う
    dependencies:
      - package: Sauce             # キーレイアウト補正キーコード（CGEvent Cmd+V 合成用, M2）
      - package: KeyboardShortcuts # グローバルホットキー（M2）
      - package: Sparkle           # 自動更新（appcast: tameo.ati-mirai.co.jp/appcast.xml）

  # 層1: ロジック/統合テスト（@testable import Tameo・インメモリSwiftData・隔離UserDefaults）。
  TameoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TameoTests
    dependencies:
      - target: Tameo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.co.ati-mirai.tameoTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tameo.app/Contents/MacOS/Tameo"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # 層2: 設定ウィンドウのUI駆動テスト（XCUITest。--uitest 起動でSparkle等を止め、設定を開く）。
  TameoUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TameoUITests
    dependencies:
      - target: Tameo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.co.ati-mirai.tameoUITests
        GENERATE_INFOPLIST_FILE: YES

# `xcodebuild test -scheme Tameo` で両テストターゲットが走るよう、テストアクションを明示する。
schemes:
  Tameo:
    build:
      targets:
        Tameo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TameoTests
        - TameoUITests

packages:
  Sauce:
    url: https://github.com/Clipy/Sauce
    from: "2.4.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: "3.0.1"          # 3.0.0 はリリースビルドでクラッシュするため厳密固定
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"                  # 直接配布アプリの自動更新（EdDSA署名＋appcast）
